<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>오답노트</title>
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/mistake.css" />
  </head>

  <body>
    <header>
      <div class="header-left">
        <a href="../../index.html" class="logo">
          <span
            style="
              background: linear-gradient(135deg, #614e9c, #7476d4);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >🛡️ </span
          ><span style="font-style: italic">STUDEO</span>
        </a>
        <ul class="nav-links">
          <li><a href="./learn.html">학습</a></li>
          <li><a href="./quiz/quizzes.html">퀴즈</a></li>
          <li class="active"><a href="./mistake.html">오답노트</a></li>
          <li><a href="./community.html">계시판</a></li>
          <li><a href="./license.html">라이선스</a></li>
        </ul>
      </div>
      <div class="header-right">
        <div class="login"><a href="./login.html">로그인</a></div>
        <a href="./mypage.html" class="mypage-link">
          <img src="../../assets/mypage-icon.png" alt="프로필 이미지" />
        </a>
        <a href="../pages/team.html" class="team-link">팀 소개</a>
      </div>
    </header>
    <div class="container">
      <h1>오답노트</h1>
      <div class="btn-center">
        <button class="primary" onclick="goBack()">이전으로</button>
        <button class="primary" onclick="startTip()">작성 TIP</button>
      </div>

      <div class="card">
        <h3>오답 입력</h3>
        <textarea id="question" placeholder="문제"></textarea>
        <input id="correct" placeholder="정답" />
        <input id="myAnswer" placeholder="내 답" />

        <select id="type">
          <option>유형1 - 이해 못함</option>
          <option>유형2 - 중간 막힘</option>
          <option>유형3 - 개념 부족</option>
          <option>유형4 - 풀이 오류</option>
          <option>유형5 - 단순 실수</option>
        </select>

        <textarea id="analysis" placeholder="분석"></textarea>

        <button class="primary" onclick="addNote()">추가</button>
      </div>

      <div id="noteList"></div>
    </div>

    <!-- ✅ 모달 -->
    <div id="tipModal" class="modal">
      <div class="modal-content">
        <h2>시험 대비 작성 TIP</h2>
        <p id="tipText"></p>

        <div class="modal-buttons">
          <button onclick="prevTip()">이전</button>
          <button onclick="nextTip()">다음</button>
          <button onclick="closeTip()">닫기</button>
        </div>
      </div>
    </div>

    <script src="../js/mistake.js"></script>
    <footer>© 김정현진과 유청림성준. All rights reserved.</footer>
  </body>
</html>
